<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Noel &amp; Irene — You Are Invited">
<title>You Are Invited — Noel &amp; Irene</title>
<link rel="icon" href="photos/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="photos/favicon.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Lato:wght@300;400&display=swap');

:root {
  --pink:       #f37894;
  --navy:       #001b43;
  --navy-dark:  #001535;
  --navy-mid:   #001e4d;
  --white:      #ffffff;
  --cream:      #fdfcfb;
  --navy-50:    rgba(0,27,67,0.50);
  --navy-60:    rgba(0,27,67,0.60);
  --navy-70:    rgba(0,27,67,0.70);
  --pink-glow:  rgba(243,120,148,0.22);
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans:  'Lato', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--white);
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }

:focus-visible { outline: 2px solid var(--pink); outline-offset: 3px; }

.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ============================================================
   STAGE SYSTEM
   ============================================================ */
.stage {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--white);
  transition: opacity 0.6s ease;
  will-change: opacity;
}
.stage.is-fading { opacity: 0; pointer-events: none; }
.stage.is-gone   { display: none; }

/* ============================================================
   STAGE 1 — LOADING
   ============================================================ */
#stage-loading { z-index: 100; gap: 1.25rem; }

.load__icon {
  position: relative; width: 88px; height: 88px;
  display: flex; align-items: center; justify-content: center;
}
.load__names {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(2rem,7vw,3rem); color: var(--navy);
  text-align: center; letter-spacing: 0.02em; line-height: 1.1;
}
.load__date {
  font-family: var(--font-sans); font-weight: 300;
  font-size: 0.82rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--navy-50); text-align: center;
}
.load__spinner { position: relative; width: 52px; height: 52px; }
.load__spinner-track { fill: none; stroke: rgba(243,120,148,0.15); stroke-width: 2.5; }
.load__spinner-arc {
  fill: none; stroke: var(--pink); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 112; stroke-dashoffset: 112;
  transform-origin: 26px 26px;
  animation: arcSpin 1.5s ease-in-out infinite;
  will-change: stroke-dashoffset, transform;
}
@keyframes arcSpin {
  0%   { stroke-dashoffset: 108; transform: rotate(-90deg); }
  50%  { stroke-dashoffset: 22;  transform: rotate(90deg);  }
  100% { stroke-dashoffset: 108; transform: rotate(270deg); }
}
.load__label {
  font-family: var(--font-sans); font-weight: 300;
  font-size: 0.825rem; color: var(--navy-50); letter-spacing: 0.04em; text-align: center;
}

/* ============================================================
   STAGE 2 — ENVELOPE SCENE
   ============================================================ */
#stage-envelope { z-index: 90; gap: 0; }

/* ─── Outer scene: tall enough for letter to emerge ─── */
.env-scene {
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  /* extra space above envelope for letter to rise into */
  padding-top: 260px;
}

/* ─── The clickable envelope wrapper (handles perspective) ─── */
.env-wrap {
  position: relative;
  width: 360px;
  height: 236px;
  cursor: pointer;
  /* Perspective for 3D flap: origin above the envelope so flap tilts away from viewer */
  perspective: 900px;
  perspective-origin: 50% -30%;
  animation: envRise 0.9s cubic-bezier(0.22,1,0.36,1) both;
  will-change: transform;
  transition: filter 0.35s ease;
}

.env-wrap:hover { filter: drop-shadow(0 20px 48px rgba(0,27,67,0.30)); }

@media (min-width: 480px) {
  .env-wrap { width: 400px; height: 260px; }
  .env-scene { padding-top: 290px; }
}
@media (min-width: 800px) {
  .env-wrap { width: 460px; height: 296px; }
  .env-scene { padding-top: 320px; }
}

@keyframes envRise {
  from { transform: translateY(60px) scale(0.96); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

/* ─── Envelope inner (position context, no clipping) ─── */
.envelope {
  position: relative;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 10px 36px rgba(0,27,67,0.22));
}

/* ─── 1. Back face (the inside — warm glow shows when flap opens) ─── */
.env-back {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 85% 65% at 50% 25%,
      rgba(243,120,148,0.20) 0%,
      rgba(243,120,148,0.05) 55%,
      transparent 80%),
    var(--navy);
  border: 1.5px solid rgba(243,120,148,0.45);
  border-radius: 3px;
  z-index: 1;
}

/* ─── 2. Letter clip container (reveals letter as it rises) ─── */
/*
   clip-path: inset(0) → letter clipped to envelope bounds (hidden below)
   clip-path: inset(-Xpx 0 0 0) → X px above envelope become visible
   Both transitions are instant (the letter's own transition handles smoothness)
*/
.env-clip {
  position: absolute;
  inset: 0;
  clip-path: inset(0 0 0 0);
  z-index: 2;
  pointer-events: none;
}

/* ─── 3. The letter card ─── */
.letter-card {
  position: absolute;
  /* starts with top edge at the envelope's bottom edge → fully hidden by clip */
  top: 100%;
  left: 50%;
  width: 88%;
  max-width: 340px;
  transform: translateX(-50%) translateY(8px); /* 8px below clip boundary */
  background: var(--cream);
  border-radius: 3px;
  border: 1px solid rgba(0,27,67,0.09);
  padding: 1.5rem 1.5rem 1.25rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.45rem;
  pointer-events: none;
  /* Smooth rise with spring-like easing */
  transition: transform 1.3s cubic-bezier(0.16,1,0.3,1);
  will-change: transform;
}

/* Gradient top stripe */
.letter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  border-radius: 0 0 2px 2px;
}

/* Letter risen state — floats above the envelope */
.letter-card.is-risen {
  transform: translateX(-50%) translateY(-290px);
  pointer-events: auto;
}

@media (min-width: 480px) {
  .letter-card.is-risen { transform: translateX(-50%) translateY(-310px); }
}
@media (min-width: 800px) {
  .letter-card.is-risen { transform: translateX(-50%) translateY(-350px); }
}

/* Staggered reveal for each line inside letter */
.ltr {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  will-change: opacity, transform;
}
.letter-card.is-risen .ltr { opacity: 1; transform: translateY(0); }
.letter-card.is-risen .ltr:nth-child(1) { transition-delay: 0.15s; }
.letter-card.is-risen .ltr:nth-child(2) { transition-delay: 0.28s; }
.letter-card.is-risen .ltr:nth-child(3) { transition-delay: 0.42s; }
.letter-card.is-risen .ltr:nth-child(4) { transition-delay: 0.52s; }
.letter-card.is-risen .ltr:nth-child(5) { transition-delay: 0.62s; }
.letter-card.is-risen .ltr:nth-child(6) { transition-delay: 0.72s; }
.letter-card.is-risen .ltr:nth-child(7) { transition-delay: 0.82s; }
.letter-card.is-risen .ltr:nth-child(8) { transition-delay: 0.95s; }
.letter-card.is-risen .ltr:nth-child(9) { transition-delay: 1.10s; }

/* Letter card box shadow (appears as letter rises) */
.letter-card.is-risen {
  box-shadow:
    0 2px 8px rgba(0,27,67,0.08),
    0 12px 40px rgba(0,27,67,0.18),
    0 32px 80px rgba(0,27,67,0.12);
}

/* Letter typography */
.ltr-logo img {
  width: 44px; height: 44px;
  object-fit: contain;
  border-radius: 50%;
  border: 1.5px solid rgba(243,120,148,0.35);
  padding: 4px;
  background: rgba(243,120,148,0.05);
}
.ltr-sub {
  font-family: var(--font-serif); font-style: italic;
  font-size: clamp(0.82rem,2.2vw,0.95rem);
  color: var(--navy-60); line-height: 1.4;
}
.ltr-headline {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(1.7rem,5vw,2.4rem);
  color: var(--navy); line-height: 1.05;
}
.ltr-rule {
  width: 50px; height: 1px;
  background: var(--pink); border: none;
  margin: 0.05rem 0;
}
.ltr-names {
  font-family: var(--font-serif); font-style: italic;
  font-size: clamp(1.05rem,3vw,1.3rem); color: var(--navy);
}
.ltr-request {
  font-family: var(--font-sans); font-weight: 300;
  font-size: clamp(0.7rem,1.8vw,0.8rem);
  color: var(--navy-70); letter-spacing: 0.03em;
}
.ltr-date {
  font-family: var(--font-sans); font-weight: 400;
  font-size: clamp(0.8rem,2vw,0.92rem);
  color: var(--navy); letter-spacing: 0.04em;
}
.ltr-verse {
  font-family: var(--font-serif); font-style: italic;
  font-size: clamp(0.66rem,1.6vw,0.75rem);
  color: var(--navy-50); line-height: 1.55;
  margin-top: 0.1rem;
}
.ltr-btn-wrap { margin-top: 0.25rem; }
.open-btn {
  display: inline-flex; align-items: center; gap: 0.45rem;
  background: var(--pink); color: var(--white);
  border: none; border-radius: 999px;
  padding: 0.8rem 2rem;
  font-family: var(--font-sans); font-weight: 400;
  font-size: 0.88rem; letter-spacing: 0.05em;
  min-height: 48px;
  box-shadow: 0 4px 20px rgba(243,120,148,0.38);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}
.open-btn:hover  { transform: scale(1.04); background: #e8607e; box-shadow: 0 6px 28px rgba(243,120,148,0.52); }
.open-btn:active { transform: scale(0.97); }

/* ─── 4. Front fold triangles (all 4 meet at envelope center) ─── */

/* Bottom fold: triangle pointing UP from bottom to center */
.env-fold-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 51%;
  clip-path: polygon(0 100%, 100% 100%, 50% 0);
  background: var(--navy-dark);
  z-index: 3;
  border-bottom: 1.5px solid rgba(243,120,148,0.35);
  border-left:   1.5px solid rgba(243,120,148,0.15);
  border-right:  1.5px solid rgba(243,120,148,0.15);
}

/* Left fold: triangle pointing RIGHT from left to center */
.env-fold-left {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 50%;
  clip-path: polygon(0 0, 0 100%, 100% 50%);
  background: var(--navy-mid);
  z-index: 4;
  border-left: 1.5px solid rgba(243,120,148,0.35);
  border-top:  1.5px solid rgba(243,120,148,0.10);
  border-bottom: 1.5px solid rgba(243,120,148,0.10);
}

/* Right fold: triangle pointing LEFT from right to center */
.env-fold-right {
  position: absolute;
  top: 0; bottom: 0; right: 0;
  width: 50%;
  clip-path: polygon(100% 0, 100% 100%, 0 50%);
  background: var(--navy-dark);
  z-index: 4;
  border-right:  1.5px solid rgba(243,120,148,0.35);
  border-top:    1.5px solid rgba(243,120,148,0.10);
  border-bottom: 1.5px solid rgba(243,120,148,0.10);
}

/* Pink border frame (sits above folds, below flap) */
.env-border {
  position: absolute; inset: 0;
  border: 1.5px solid rgba(243,120,148,0.45);
  border-radius: 3px;
  z-index: 5;
  pointer-events: none;
}

/* ─── 5. Flap (top triangle — rotates backward to open) ─── */
.env-flap-wrap {
  position: absolute;
  top: -1px; left: -1px; right: -1px;
  /* flap height = ~51% so tip meets center of envelope */
  height: 52%;
  transform-style: preserve-3d;
  z-index: 10;
}

.env-flap {
  position: absolute;
  inset: 0;
  /* Triangle: top-left, top-right, bottom-center (tip at center of envelope) */
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  background: linear-gradient(170deg, #002060 0%, var(--navy) 60%, var(--navy-dark) 100%);
  border-top:   1.5px solid rgba(243,120,148,0.55);
  border-left:  1.5px solid rgba(243,120,148,0.30);
  border-right: 1.5px solid rgba(243,120,148,0.30);
  transform-origin: top center;
  transform: rotateX(0deg);
  /* Slow, natural opening — 1s with ease-in then ease-out */
  transition: transform 1.05s cubic-bezier(0.4, 0, 0.2, 1);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  will-change: transform;
}

/* Subtle inner sheen on the flap */
.env-flap::after {
  content: '';
  position: absolute; inset: 0;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  background: linear-gradient(160deg,
    rgba(255,255,255,0.07) 0%,
    transparent 55%,
    rgba(0,0,0,0.08) 100%
  );
}

/* Open state — rotates 185deg backward (disappears behind envelope) */
.env-flap.is-open { transform: rotateX(-185deg); }

/* ─── Wax seal on the flap ─── */
.env-seal {
  position: absolute;
  top: 33%; left: 50%;
  transform: translate(-50%, -50%);
  width: 54px; height: 54px;
  background: var(--white);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 0 0 2.5px var(--pink),
    0 0 0 5px rgba(243,120,148,0.18),
    0 4px 12px rgba(243,120,148,0.40);
  z-index: 11;
  cursor: pointer;
  padding: 6px;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.env-seal__logo {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  border-radius: 50%;
}
.env-seal.is-fading { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }

/* ─── Hint text ─── */
.env-hint {
  margin-top: 2rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
  transition: opacity 0.5s ease;
}
.env-hint.is-gone { opacity: 0; pointer-events: none; }

.hint-text {
  font-family: var(--font-serif); font-style: italic;
  font-size: clamp(1rem,3vw,1.25rem);
  color: var(--navy-60); text-align: center;
  animation: hintPulse 2.4s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

.hint-arrow {
  animation: hintBounce 1.7s ease-in-out infinite;
  will-change: transform;
}
@keyframes hintBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(8px); }
}

/* ─── Outro overlay ─── */
#outro-overlay {
  position: fixed; inset: 0; background: var(--white);
  opacity: 0; pointer-events: none; z-index: 9999;
  transition: opacity 0.8s ease;
}
#outro-overlay.is-fading { opacity: 1; pointer-events: all; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width: 800px) {
  .env-wrap { width: 460px; height: 296px; }
  .letter-card { max-width: 380px; }
}

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  .load__spinner-arc    { animation: none; stroke-dashoffset: 0; }
  .hint-text            { animation: none; }
  .hint-arrow           { animation: none; }
  .env-wrap             { animation: none; }
  .env-flap             { transition: none; }
  .letter-card          { transition: none; }
  .ltr                  { opacity: 1 !important; transform: none !important; transition: none !important; }
  .env-seal             { transition: none; }
  .stage                { transition: none; }
  #outro-overlay        { transition: none; }
  .open-btn             { transition: none; }
}
</style>
</head>
<body>

<div id="aria-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="outro-overlay"></div>

<!-- ============================================================
     STAGE 1 — LOADING
     ============================================================ -->
<div id="stage-loading" class="stage" aria-label="Preparing your invitation" role="status">

  <div class="load__icon" aria-hidden="true">
    <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <rect x="39.5" y="4"  width="9"  height="46" rx="2.5" fill="#f37894" opacity="0.82"/>
      <rect x="20"   y="18" width="48" height="9"  rx="2.5" fill="#f37894" opacity="0.82"/>
      <circle cx="30" cy="70" r="14" fill="none" stroke="#001b43" stroke-width="3" opacity="0.65"/>
      <circle cx="46" cy="70" r="14" fill="none" stroke="#f37894" stroke-width="3" opacity="0.82"/>
      <path d="M39,63 C37,65.5 37,74.5 39,77" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
  </div>

  <p class="load__names">Noel &amp; Irene</p>
  <p class="load__date">July 7, 2026</p>

  <div class="load__spinner" role="progressbar" aria-label="Loading">
    <svg width="52" height="52" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle class="load__spinner-track" cx="26" cy="26" r="21"/>
      <circle class="load__spinner-arc"   cx="26" cy="26" r="21"/>
    </svg>
  </div>

  <p class="load__label">Preparing your invitation&hellip;</p>
</div>

<!-- ============================================================
     STAGE 2 — ENVELOPE SCENE
     ============================================================ -->
<div id="stage-envelope" class="stage" style="display:none;opacity:0;" aria-label="Your wedding invitation">

  <div class="env-scene">

    <!-- THE ENVELOPE -->
    <div class="env-wrap">
      <div class="envelope"
           id="envelope"
           role="button"
           tabindex="0"
           aria-label="Open your wedding invitation"
           aria-expanded="false">

        <!-- 1. Back face (visible through opening when flap is up) -->
        <div class="env-back" aria-hidden="true"></div>

        <!-- 2. Letter clip — clip-path controls when letter is visible -->
        <div class="env-clip" id="env-clip" aria-hidden="true">

          <div class="letter-card" id="letter-card" aria-hidden="true">

            <!-- Logo seal -->
            <div class="ltr ltr-logo" aria-hidden="true">
              <img src="photos/favicon.png" alt="" width="44" height="44" loading="eager">
            </div>

            <!-- Together with their families -->
            <p class="ltr ltr-sub">Together with their families</p>

            <!-- You Are Invited -->
            <h2 class="ltr ltr-headline">You Are Invited</h2>

            <!-- Rule -->
            <hr class="ltr ltr-rule" aria-hidden="true">

            <!-- Names -->
            <p class="ltr ltr-names">Noel &amp; Irene</p>

            <!-- Request -->
            <p class="ltr ltr-request">request the honour of your presence</p>

            <!-- Date -->
            <p class="ltr ltr-date">Tuesday, the 7th of July, 2026</p>

            <!-- Verse -->
            <p class="ltr ltr-verse">
              &ldquo;What God has joined together,<br>
              let no one separate.&rdquo;
            </p>

            <!-- CTA -->
            <div class="ltr ltr-btn-wrap">
              <button class="open-btn" id="open-btn" aria-label="Open the full wedding invitation">
                Open Invitation
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                     aria-hidden="true">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>

          </div>
        </div>

        <!-- 3. Front fold triangles (all tips meet at envelope center) -->
        <div class="env-fold-bottom" aria-hidden="true"></div>
        <div class="env-fold-left"   aria-hidden="true"></div>
        <div class="env-fold-right"  aria-hidden="true"></div>

        <!-- 4. Pink border frame -->
        <div class="env-border" aria-hidden="true"></div>

        <!-- 5. Flap (rotates open in 3D) -->
        <div class="env-flap-wrap" aria-hidden="true">
          <div class="env-flap" id="env-flap">
            <div class="env-seal" id="env-seal" aria-hidden="true">
              <img src="photos/favicon.png" alt="" class="env-seal__logo" width="42" height="42" loading="eager">
            </div>
          </div>
        </div>

      </div>
    </div><!-- /.env-wrap -->

    <!-- Hint below the envelope -->
    <div class="env-hint" id="env-hint" aria-hidden="true">
      <p class="hint-text">Tap the envelope to open</p>
      <div class="hint-arrow" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <path d="M12 5v14M5 12l7 7 7-7"
                stroke="#f37894" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

  </div><!-- /.env-scene -->

</div><!-- /#stage-envelope -->

<script>
document.addEventListener('DOMContentLoaded', function () {
  'use strict';

  var stageLoading  = document.getElementById('stage-loading');
  var stageEnvelope = document.getElementById('stage-envelope');
  var envelope      = document.getElementById('envelope');
  var envFlap       = document.getElementById('env-flap');
  var envSeal       = document.getElementById('env-seal');
  var envClip       = document.getElementById('env-clip');
  var envHint       = document.getElementById('env-hint');
  var letterCard    = document.getElementById('letter-card');
  var openBtn       = document.getElementById('open-btn');
  var outroOverlay  = document.getElementById('outro-overlay');
  var ariaStatus    = document.getElementById('aria-status');
  var isOpened      = false;

  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function announce(msg) {
    ariaStatus.textContent = '';
    requestAnimationFrame(function () { ariaStatus.textContent = msg; });
  }

  /* ── Stage 1 → 2: loading fades, envelope appears ── */
  setTimeout(function () {
    stageLoading.style.transition = 'opacity 0.6s ease';
    stageLoading.style.opacity    = '0';

    setTimeout(function () {
      stageLoading.style.display  = 'none';
      stageEnvelope.style.display = 'flex';

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          stageEnvelope.style.transition = 'opacity 0.55s ease';
          stageEnvelope.style.opacity    = '1';
          announce('Your invitation is ready. Tap the envelope to open it.');
        });
      });
    }, prefersReduced ? 0 : 650);
  }, 2400);

  /* ── Open sequence ── */
  function openSequence() {
    if (isOpened) return;
    isOpened = true;

    envelope.setAttribute('aria-expanded', 'true');
    envelope.setAttribute('aria-label', 'Opening your invitation');
    envelope.style.cursor        = 'default';
    envelope.style.pointerEvents = 'none';

    announce('Opening your invitation…');

    /* 1. Hide hint immediately */
    envHint.classList.add('is-gone');

    /* 2. Fade + shrink the wax seal (300ms) */
    envSeal.classList.add('is-fading');

    /* 3. After seal fades → open the flap (rotates in 3D, ~1s) */
    var flapDelay = prefersReduced ? 0 : 380;
    setTimeout(function () {
      envFlap.classList.add('is-open');
    }, flapDelay);

    /*
     * 4. While flap is ~halfway open, open the clip so the letter
     *    can rise above the envelope, then start the letter rising.
     *
     *    The clip switch is instant (no transition). Because the letter
     *    is still below the clip boundary at this point, the switch
     *    is invisible — the letter only becomes visible as it rises.
     */
    var letterDelay = prefersReduced ? 0 : flapDelay + 420;
    setTimeout(function () {
      /* Open clip to 400px above envelope */
      envClip.style.clipPath = 'inset(-400px 0 0 0)';

      /* Trigger letter rise on next frame so clip change is committed first */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          letterCard.setAttribute('aria-hidden', 'false');
          letterCard.classList.add('is-risen');
          announce('You are invited! Your letter has arrived.');
        });
      });
    }, letterDelay);
  }

  envelope.addEventListener('click', openSequence);
  envelope.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openSequence();
    }
  });

  /* ── Navigate to full invitation ── */
  openBtn.addEventListener('click', function () {
    announce('Opening invitation website…');
    outroOverlay.classList.add('is-fading');

    function navigate() {
      sessionStorage.setItem('intro_seen', '1');
      window.location.href = 'invitation.html';
    }

    if (prefersReduced) { navigate(); return; }

    var didNav = false;
    outroOverlay.addEventListener('transitionend', function onOut(e) {
      if (e.propertyName !== 'opacity') return;
      if (!didNav) { didNav = true; navigate(); }
      outroOverlay.removeEventListener('transitionend', onOut);
    });
    setTimeout(function () { if (!didNav) { didNav = true; navigate(); } }, 950);
  });

});
</script>
