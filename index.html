<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Noel &amp; Irene — You Are Invited">
<title>You Are Invited — Noel &amp; Irene</title>

<style>
/* === GOOGLE FONTS === */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Lato:wght@300;400&display=swap');

/* ============================================================
   CSS CUSTOM PROPERTIES
   ============================================================ */
:root {
  --pink:  #f37894;
  --navy:  #001b43;
  --white: #ffffff;
  --pink-glow: rgba(243, 120, 148, 0.22);
  --navy-10:   rgba(0, 27, 67, 0.10);
  --navy-50:   rgba(0, 27, 67, 0.50);
  --navy-60:   rgba(0, 27, 67, 0.60);
  --navy-70:   rgba(0, 27, 67, 0.70);
  --transition-base: 200ms ease;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans:  'Lato', system-ui, sans-serif;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--white);
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

:focus-visible {
  outline: 2px solid var(--pink);
  outline-offset: 3px;
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ============================================================
   STAGE SYSTEM
   ============================================================ */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--white);
  transition: opacity 0.6s ease;
  will-change: opacity;
}

.stage.is-fading  { opacity: 0; pointer-events: none; }
.stage.is-gone    { display: none; }

/* ============================================================
   STAGE 1 — LOADING SCREEN
   ============================================================ */
#stage-loading {
  z-index: 100;
  gap: 1.25rem;
}

/* Cross + rings icon */
.load__icon {
  position: relative;
  width: 88px;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Names */
.load__names {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(2rem, 7vw, 3rem);
  color: var(--navy);
  text-align: center;
  letter-spacing: 0.02em;
  line-height: 1.1;
}

/* Date */
.load__date {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 0.82rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--navy-50);
  text-align: center;
}

/* SVG arc spinner */
.load__spinner {
  position: relative;
  width: 52px;
  height: 52px;
}

.load__spinner-track {
  fill: none;
  stroke: rgba(243,120,148,0.15);
  stroke-width: 2.5;
}

.load__spinner-arc {
  fill: none;
  stroke: var(--pink);
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-dasharray: 112;
  stroke-dashoffset: 112;
  transform-origin: 26px 26px;
  animation: arcSpin 1.5s ease-in-out infinite;
  will-change: stroke-dashoffset, transform;
}

@keyframes arcSpin {
  0%   { stroke-dashoffset: 108; transform: rotate(-90deg); }
  50%  { stroke-dashoffset: 22;  transform: rotate(90deg);  }
  100% { stroke-dashoffset: 108; transform: rotate(270deg); }
}

/* Loading label */
.load__label {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 0.825rem;
  color: var(--navy-50);
  letter-spacing: 0.04em;
  text-align: center;
}

/* ============================================================
   STAGE 2 — ENVELOPE SCENE
   ============================================================ */
#stage-envelope {
  z-index: 90;
  gap: 2.5rem;
}

/* Envelope wrapper — handles perspective for 3D flap */
.envelope-wrap {
  position: relative;
  width: 320px;
  height: 220px;
  perspective: 600px;
  perspective-origin: 50% 0%;
  animation: envRise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  will-change: transform, opacity;
  cursor: pointer;
}

@media (min-width: 600px) {
  .envelope-wrap {
    width: 420px;
    height: 280px;
  }
}

@keyframes envRise {
  from { transform: translateY(80px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* Tabindex / role="button" wrapper */
.envelope {
  position: relative;
  width: 100%;
  height: 100%;
}

/* --- Envelope body (navy rectangle with pink border) --- */
.env-body {
  position: absolute;
  inset: 0;
  background: var(--navy);
  border: 1.5px solid var(--pink);
  border-radius: 4px;
  box-shadow:
    0 8px 40px rgba(0,27,67,0.18),
    0 2px 10px rgba(0,27,67,0.10),
    inset 0 0 0 1px rgba(255,255,255,0.04);
  overflow: hidden;
  z-index: 1;
}

/* Left inner fold line (white diagonal) */
.env-fold-left {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom right,
    transparent 49.3%,
    rgba(255,255,255,0.13) 49.3%,
    rgba(255,255,255,0.13) 50.7%,
    transparent 50.7%
  );
}

/* Right inner fold line */
.env-fold-right {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom left,
    transparent 49.3%,
    rgba(255,255,255,0.13) 49.3%,
    rgba(255,255,255,0.13) 50.7%,
    transparent 50.7%
  );
}

/* Pink inner glow (appears when flap opens) */
.env-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse 80% 60% at 50% 65%,
    rgba(243,120,148,0.22) 0%,
    transparent 70%
  );
  opacity: 0;
  transition: opacity 0.7s ease 0.2s;
  z-index: 2;
}

.env-glow.is-lit { opacity: 1; }

/* --- Letter card (rises from inside) --- */
.letter-card {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  width: 278px;
  background: var(--white);
  border: 1px solid rgba(0,27,67,0.12);
  border-radius: 4px;
  box-shadow:
    0 2px 8px rgba(0,27,67,0.10),
    0 12px 40px rgba(0,27,67,0.18);
  padding: 1.5rem 1.375rem 1.25rem;
  text-align: center;
  z-index: 4;
  opacity: 0;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  transition:
    transform 1.05s cubic-bezier(0.22, 1, 0.36, 1),
    opacity   0.45s ease;
  will-change: transform, opacity;
}

@media (min-width: 600px) {
  .letter-card {
    width: 360px;
    padding: 1.75rem 1.75rem 1.5rem;
  }
}

/* Pink top stripe */
.letter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--pink);
  border-radius: 4px 4px 0 0;
}

/* Letter risen state */
.letter-card.is-risen {
  transform: translateX(-50%) translateY(-145px);
  opacity: 1;
  pointer-events: auto;
}

@media (min-width: 600px) {
  .letter-card.is-risen {
    transform: translateX(-50%) translateY(-175px);
  }
}

/* Staggered reveal for each line */
.ltr {
  opacity: 0;
  transform: translateY(7px);
  transition: opacity 0.45s ease, transform 0.45s ease;
  will-change: opacity, transform;
}

.letter-card.is-risen .ltr:nth-child(1)  { transition-delay: 0.10s; }
.letter-card.is-risen .ltr:nth-child(2)  { transition-delay: 0.22s; }
.letter-card.is-risen .ltr:nth-child(3)  { transition-delay: 0.36s; }
.letter-card.is-risen .ltr:nth-child(4)  { transition-delay: 0.46s; }
.letter-card.is-risen .ltr:nth-child(5)  { transition-delay: 0.56s; }
.letter-card.is-risen .ltr:nth-child(6)  { transition-delay: 0.66s; }
.letter-card.is-risen .ltr:nth-child(7)  { transition-delay: 0.76s; }
.letter-card.is-risen .ltr:nth-child(8)  { transition-delay: 0.88s; }
.letter-card.is-risen .ltr:nth-child(9)  { transition-delay: 1.02s; }

.letter-card.is-risen .ltr {
  opacity: 1;
  transform: translateY(0);
}

/* Letter typography */
.ltr-sub {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(0.85rem, 2.3vw, 1rem);
  color: var(--navy-60);
  line-height: 1.4;
}

.ltr-headline {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(1.8rem, 5.5vw, 2.5rem);
  color: var(--navy);
  line-height: 1.05;
}

.ltr-rule {
  width: 60px;
  height: 1px;
  background: var(--pink);
  border: none;
  margin: 0.1rem 0;
}

.ltr-names {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(1.1rem, 3.5vw, 1.4rem);
  color: var(--navy);
}

.ltr-request {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: clamp(0.72rem, 2vw, 0.82rem);
  color: var(--navy-70);
  letter-spacing: 0.03em;
}

.ltr-date {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: clamp(0.82rem, 2.2vw, 0.95rem);
  color: var(--navy);
  letter-spacing: 0.04em;
}

.ltr-verse {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(0.68rem, 1.8vw, 0.78rem);
  color: var(--navy-50);
  line-height: 1.55;
  margin-top: 0.15rem;
}

/* Open Invitation button */
.ltr-btn-wrap {
  margin-top: auto;
  padding-top: 0.5rem;
}

.open-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  background: var(--pink);
  color: var(--white);
  border: none;
  border-radius: 999px;
  padding: 0.875rem 2.25rem;
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
  min-height: 48px;
  box-shadow: 0 4px 20px rgba(243,120,148,0.38);
  transition:
    transform     var(--transition-base),
    background    var(--transition-base),
    box-shadow    var(--transition-base);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.open-btn:hover {
  transform: scale(1.04);
  background: #e8607e;
  box-shadow: 0 6px 28px rgba(243,120,148,0.52);
}

.open-btn:active { transform: scale(0.97); }

/* --- Envelope flap (3D-rotating triangle) --- */
.env-flap-wrap {
  position: absolute;
  top: -1px; left: -1px; right: -1px;
  height: 52%;
  z-index: 10;
  transform-style: preserve-3d;
}

.env-flap {
  position: absolute;
  inset: 0;
  background: var(--navy);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-top:   1.5px solid var(--pink);
  border-left:  1.5px solid var(--pink);
  border-right: 1.5px solid var(--pink);
  transform-origin: top center;
  transform: rotateX(0deg);
  transition: transform 0.75s ease-in-out;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  will-change: transform;
}

/* Subtle pink inner face (warm glow inside the open flap) */
.env-flap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(243,120,148,0.05) 0%,
    rgba(243,120,148,0.14) 100%
  );
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

.env-flap.is-open {
  transform: rotateX(180deg);
}

/* Wax seal (centered on triangle ~33% down) */
.env-seal {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
  background: var(--pink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 2px 10px rgba(243,120,148,0.55),
    0 0 0 2px rgba(255,255,255,0.15);
  transition: opacity 0.3s ease;
  z-index: 11;
  cursor: pointer;
}

.env-seal.is-fading { opacity: 0; }

/* --- Hint text + bounce icon --- */
.env-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  transition: opacity 0.4s ease;
}

.env-hint.is-gone { opacity: 0; pointer-events: none; }

.hint-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(1rem, 3vw, 1.3rem);
  color: var(--navy);
  text-align: center;
  animation: hintPulse 2s ease-in-out infinite;
}

@keyframes hintPulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

.hint-icon {
  animation: hintBounce 1.6s ease-in-out infinite;
  will-change: transform;
}

@keyframes hintBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(7px); }
}

/* ============================================================
   OUTRO OVERLAY (fades to white before navigating)
   ============================================================ */
#outro-overlay {
  position: fixed;
  inset: 0;
  background: var(--white);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.8s ease;
}

#outro-overlay.is-fading {
  opacity: 1;
  pointer-events: all;
}

/* ============================================================
   MOBILE-FIRST RESPONSIVE TWEAKS
   ============================================================ */
@media (min-width: 900px) {
  .envelope-wrap {
    width: 460px;
    height: 300px;
  }
  .letter-card {
    width: 390px;
  }
  .letter-card.is-risen {
    transform: translateX(-50%) translateY(-195px);
  }
}

/* ============================================================
   ACCESSIBILITY — REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  .load__spinner-arc      { animation: none; stroke-dashoffset: 0; }
  .hint-text              { animation: none; }
  .hint-icon              { animation: none; }
  .envelope-wrap          { animation: none; }
  .env-flap               { transition: none; }
  .ltr                    { opacity: 1 !important; transform: none !important; transition: none !important; }
  .letter-card            { transition: none; }
  .letter-card.is-risen   { transform: translateX(-50%) translateY(-145px); opacity: 1; }
  .env-seal               { transition: none; }
  .env-glow               { transition: none; }
  .stage                  { transition: none; }
  #outro-overlay          { transition: none; }
  .open-btn               { transition: none; }
}
</style>
</head>
<body>

<!-- Screen reader live region -->
<div id="aria-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<!-- ============================================================
     OUTRO OVERLAY — white wash before navigating
     ============================================================ -->
<div id="outro-overlay"></div>

<!-- ============================================================
     STAGE 1 — LOADING SCREEN
     ============================================================ -->
<div id="stage-loading" class="stage" aria-label="Preparing your invitation" role="status">

  <!-- Cross + intertwined rings -->
  <div class="load__icon" aria-hidden="true">
    <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <!-- Cross -->
      <rect x="39.5" y="4"  width="9" height="46" rx="2.5" fill="#f37894" opacity="0.82"/>
      <rect x="20"   y="18" width="48" height="9" rx="2.5" fill="#f37894" opacity="0.82"/>
      <!-- Ring 1 (left, navy) -->
      <circle cx="30" cy="70" r="14" fill="none" stroke="#001b43" stroke-width="3" opacity="0.65"/>
      <!-- Ring 2 (right, pink) — overlapping -->
      <circle cx="46" cy="70" r="14" fill="none" stroke="#f37894" stroke-width="3" opacity="0.82"/>
      <!-- White mask to create intertwine effect (left ring in front on the overlap) -->
      <path d="M39,63 C37,65.5 37,74.5 39,77" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Couple names -->
  <p class="load__names">Noel &amp; Irene</p>

  <!-- Date -->
  <p class="load__date">July 7, 2026</p>

  <!-- SVG Arc Spinner -->
  <div class="load__spinner" role="progressbar" aria-label="Loading">
    <svg width="52" height="52" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle class="load__spinner-track" cx="26" cy="26" r="21"/>
      <circle class="load__spinner-arc"   cx="26" cy="26" r="21"/>
    </svg>
  </div>

  <p class="load__label">Preparing your invitation&hellip;</p>

</div>

<!-- ============================================================
     STAGE 2 / 3 / 4 — ENVELOPE + LETTER
     ============================================================ -->
<div id="stage-envelope" class="stage is-gone" style="opacity:0" aria-label="Your wedding invitation">

  <!-- ENVELOPE -->
  <div class="envelope-wrap">
    <div class="envelope"
         id="envelope"
         role="button"
         tabindex="0"
         aria-label="Open your wedding invitation"
         aria-expanded="false">

      <!-- Body (navy rectangle + fold lines + glow) -->
      <div class="env-body">
        <div class="env-fold-left"  aria-hidden="true"></div>
        <div class="env-fold-right" aria-hidden="true"></div>
        <div class="env-glow" id="env-glow" aria-hidden="true"></div>
      </div>

      <!-- Letter card (rises from inside) — aria-hidden until risen -->
      <div class="letter-card" id="letter-card" aria-hidden="true">

        <!-- 1. Cross -->
        <div class="ltr" aria-hidden="true">
          <svg width="20" height="26" viewBox="0 0 20 26" xmlns="http://www.w3.org/2000/svg">
            <rect x="8"  y="0"  width="4"  height="26" rx="1.5" fill="#f37894" opacity="0.85"/>
            <rect x="0"  y="7"  width="20" height="4"  rx="1.5" fill="#f37894" opacity="0.85"/>
          </svg>
        </div>

        <!-- 2. Sub heading -->
        <p class="ltr ltr-sub">Together with their families</p>

        <!-- 3. Main headline -->
        <h2 class="ltr ltr-headline">You Are Invited</h2>

        <!-- 4. Rule -->
        <hr class="ltr ltr-rule" aria-hidden="true">

        <!-- 5. Names -->
        <p class="ltr ltr-names">Noel &amp; Irene</p>

        <!-- 6. Request line -->
        <p class="ltr ltr-request">request the honour of your presence</p>

        <!-- 7. Date -->
        <p class="ltr ltr-date">Tuesday, the 7th of July, 2026</p>

        <!-- 8. Bible verse -->
        <p class="ltr ltr-verse">
          &ldquo;What God has joined together,<br>
          let no one separate.&rdquo;
        </p>

        <!-- 9. CTA button -->
        <div class="ltr ltr-btn-wrap">
          <button class="open-btn" id="open-btn" aria-label="Open the wedding invitation website">
            Open Invitation
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                 aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

      </div>

      <!-- Flap (3D rotating triangle) -->
      <div class="env-flap-wrap" aria-hidden="true">
        <div class="env-flap" id="env-flap">

          <!-- Wax seal (fades out before flap opens) -->
          <div class="env-seal" id="env-seal" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
              <rect x="9.5" y="2"  width="3"  height="18" rx="1" fill="white" opacity="0.92"/>
              <rect x="2"   y="9.5" width="18" height="3"  rx="1" fill="white" opacity="0.92"/>
            </svg>
          </div>

        </div>
      </div>

    </div>
  </div><!-- /.envelope-wrap -->

  <!-- Hint text + tap icon -->
  <div class="env-hint" id="env-hint" aria-hidden="true">
    <p class="hint-text">Tap to open your invitation</p>
    <div class="hint-icon" aria-hidden="true">
      <!-- Hand / tap SVG icon -->
      <svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">
        <!-- Finger 1 (index) -->
        <path d="M15 2 C12.8 2 11 3.8 11 6 L11 20
                 C9.8 19.3 8.4 19.5 7.3 20.4
                 C6 21.5 6.2 23 6.2 23 L6.5 30
                 C6.5 34 10 37 14.5 37 L19 37
                 C23 37 25 33.5 25 30 L25 14
                 C25 12 23.3 10.5 21.3 10.5
                 C20.7 10.5 20.1 10.7 19.6 11
                 C19 9.4 17.5 8.3 15.8 8.2
                 L15.8 6 C15.8 3.8 15.6 2 15 2 Z"
              fill="var(--navy)" opacity="0.22"/>
        <path d="M15 3.5 C13.6 3.5 12.5 4.6 12.5 6 L12.5 21
                 L11.3 20.2 C10.5 19.6 9.4 19.7 8.7 20.4
                 C8.2 21 8 22 8.5 23 L11.5 28
                 C12.5 29.5 14 30.5 15.5 30.5 L18.5 30.5
                 C21.5 30.5 23 28.5 23 26 L23 14
                 C23 12.9 22.1 12 21 12
                 C20.5 12 19.9 12.2 19.6 12.5
                 C19.3 11.5 18.3 10.8 17.2 10.8
                 C16.7 10.8 16.2 11 15.9 11.3
                 L15.9 6 C15.9 4.6 15.5 3.5 15 3.5 Z"
              fill="var(--navy)" opacity="0.42"/>
        <!-- Tap ripple -->
        <circle cx="15" cy="4" r="3" fill="none" stroke="var(--pink)" stroke-width="1.2" opacity="0.45"/>
      </svg>
    </div>
  </div>

</div><!-- /#stage-envelope -->

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  'use strict';

  /* --- Element references --- */
  const stageLoading  = document.getElementById('stage-loading');
  const stageEnvelope = document.getElementById('stage-envelope');
  const envelope      = document.getElementById('envelope');
  const envFlap       = document.getElementById('env-flap');
  const envSeal       = document.getElementById('env-seal');
  const envGlow       = document.getElementById('env-glow');
  const envHint       = document.getElementById('env-hint');
  const letterCard    = document.getElementById('letter-card');
  const openBtn       = document.getElementById('open-btn');
  const outroOverlay  = document.getElementById('outro-overlay');
  const ariaStatus    = document.getElementById('aria-status');
  let   isOpened      = false;

  /* --- Announce helper --- */
  function announce(msg) {
    ariaStatus.textContent = '';
    requestAnimationFrame(() => { ariaStatus.textContent = msg; });
  }

  /* --- Reduced motion check --- */
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ============================================================
     STAGE 1 → 2 : After 2.5 s, fade loading and show envelope
     ============================================================ */
  setTimeout(function () {
    stageLoading.classList.add('is-fading');
    announce('Invitation ready. Tap the envelope to open it.');

    function showEnvelope() {
      stageLoading.classList.add('is-gone');
      stageEnvelope.classList.remove('is-gone');
      /* Force reflow then fade in */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          stageEnvelope.style.opacity = '1';
          stageEnvelope.style.transition = 'opacity 0.5s ease';
        });
      });
    }

    if (prefersReduced) {
      showEnvelope();
    } else {
      stageLoading.addEventListener('transitionend', function handler(e) {
        if (e.propertyName !== 'opacity') return;
        showEnvelope();
        stageLoading.removeEventListener('transitionend', handler);
      });
      /* Fallback in case transitionend is unreliable */
      setTimeout(showEnvelope, 700);
    }
  }, 2500);

  /* ============================================================
     STAGE 2 → 3 → 4 : Open sequence on click / keyboard
     ============================================================ */
  function openSequence() {
    if (isOpened) return;
    isOpened = true;

    envelope.setAttribute('aria-expanded', 'true');
    envelope.setAttribute('aria-label', 'Opening your invitation');
    envelope.style.cursor  = 'default';
    envelope.style.pointerEvents = 'none';

    /* Hide hint */
    envHint.classList.add('is-gone');

    /* STAGE 3a — Fade wax seal */
    envSeal.classList.add('is-fading');
    announce('Opening envelope…');

    /* When seal fade ends → open flap */
    function openFlap() {
      envFlap.classList.add('is-open');
      envGlow.classList.add('is-lit');
    }

    /* When flap transition ends → raise letter */
    function raiseLetterOnFlapDone() {
      letterCard.setAttribute('aria-hidden', 'false');
      letterCard.classList.add('is-risen');
      announce('You are invited! Your invitation letter has arrived.');
    }

    if (prefersReduced) {
      openFlap();
      raiseLetterOnFlapDone();
      return;
    }

    /* Use transitionend for precise chaining */
    const sealTimer = setTimeout(openFlap, 420);

    envSeal.addEventListener('transitionend', function onSeal(e) {
      if (e.propertyName !== 'opacity') return;
      clearTimeout(sealTimer);
      openFlap();
      envSeal.removeEventListener('transitionend', onSeal);
    }, { once: true });

    /* After flap opens → raise letter */
    const flapTimer = setTimeout(raiseLetterOnFlapDone, 1350);

    envFlap.addEventListener('transitionend', function onFlap(e) {
      if (e.propertyName !== 'transform') return;
      clearTimeout(flapTimer);
      raiseLetterOnFlapDone();
      envFlap.removeEventListener('transitionend', onFlap);
    }, { once: true });
  }

  envelope.addEventListener('click', openSequence);
  envelope.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openSequence();
    }
  });

  /* ============================================================
     STAGE 5 : Navigate to main invitation site
     ============================================================ */
  openBtn.addEventListener('click', function () {
    announce('Opening invitation website…');
    outroOverlay.classList.add('is-fading');

    function navigate() { window.location.href = 'invitation.html'; }

    if (prefersReduced) {
      navigate();
      return;
    }

    outroOverlay.addEventListener('transitionend', function onOutro(e) {
      if (e.propertyName !== 'opacity') return;
      navigate();
      outroOverlay.removeEventListener('transitionend', onOutro);
    }, { once: true });

    /* Fallback */
    setTimeout(navigate, 900);
  });

});
</script>

</body>
</html>
